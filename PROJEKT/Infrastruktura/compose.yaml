services:
  broker:
    image: confluentinc/cp-kafka:7.8.0
    hostname: broker
    container_name: rta-broker
    ports:
      - "29092:29092"
    environment:
      KAFKA_CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@broker:9093"
      KAFKA_LISTENERS: "PLAINTEXT://broker:9092,CONTROLLER://broker:9093,PLAINTEXT_HOST://0.0.0.0:29092"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://broker:9092,PLAINTEXT_HOST://localhost:29092"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAME: "CONTROLLER"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "broker:9092"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  kafka-init:
    image: confluentinc/cp-kafka:7.8.0
    container_name: rta-kafka-init
    depends_on:
      broker:
        condition: service_healthy
    volumes:
      - ./kafka/init-topics.sh:/init-topics.sh:ro
    entrypoint: ["/bin/bash", "/init-topics.sh"]
    restart: "no"

  postgres:
    image: postgres:16-alpine
    container_name: rta-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-rta}
      POSTGRES_USER: ${POSTGRES_USER:-rta}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rta}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-rta} -d ${POSTGRES_DB:-rta}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7.2-alpine
    container_name: rta-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  jupyter:
    build: .
    container_name: rta-jupyter
    depends_on:
      broker:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    environment:
      - JUPYTER_TOKEN=${JUPYTER_TOKEN:-root}
      - KAFKA_BOOTSTRAP_INTERNAL=${KAFKA_BOOTSTRAP_INTERNAL:-broker:9092}
      - POSTGRES_HOST=${POSTGRES_HOST:-postgres}
      - POSTGRES_PORT=${POSTGRES_PORT:-5432}
      - POSTGRES_DB=${POSTGRES_DB:-rta}
      - POSTGRES_USER=${POSTGRES_USER:-rta}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-rta}
      - REDIS_HOST=${REDIS_HOST:-redis}
      - REDIS_PORT=${REDIS_PORT:-6379}
    volumes:
      - ..:/home/jovyan/notebooks/PROJEKT
    working_dir: /home/jovyan/notebooks/PROJEKT
    ports:
      - "8999:8888"
      - "4040:4040"

volumes:
  postgres_data:
